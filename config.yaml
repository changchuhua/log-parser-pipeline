directories:
  dataset_name: "loghub"
  input_dir: data/raw
  output_dir: data/processed
  cache_dir: data/cache
extractor:
  batch_size: 5000
  lookback_time: now-24h
  dataset_name: "securityonion"  # Component 2's output dataset folder; overrides directories.dataset_name for extract_so_logs.py only. Set to null/omit to fall back to directories.dataset_name.
  dlq_use_sudo: false             # prefix the remote DLQ `cat` with sudo; leave false when the SSH user is in the `logstash` group (recommended), set true only if relying on a sudoers NOPASSWD grant instead
llm:
  api_base: "http://ollama:11434/api"  # fallback only — OLLAMA_API_BASE in .env always wins when set; this only matters if main_parser.py runs without .env loaded (e.g. directly, outside `docker compose run`)
logparser_llm:
  k_shots: 3
  loose_match_threshold: 0.8
  categories_mode: "paper_10"     # Options: "ecs_10", "paper_10", "ecs_3"
  calibration_file: "" # Provide 32 ground-truth examples here to enable LogParser-LLM-C
  icl_selection_strategy: "similarity" # Options: "similarity", "diversity"
  loose_match_metric: "positional_uniform" # Options: "positional_decay", "positional_uniform", "jaccard"
  decay_factor: 0.15              # Decay coefficient lambda
  merge_similarity_threshold: 0.95
logbatcher:
  batch_size: 5
  sampler: "DPPSampler"          # "DPPSampler" or "SimilarSampler"
  cluster: "SimilarityCluster"        # "LengthCluster" or "SimilarityCluster"
  vectorizer: "tfidf"           # "binary" (Jaccard) or "tfidf" (Cosine)
  use_dynamic_eps: false         # scale DBSCAN eps dynamically
  noise_max_retries: 2           # max re-queues for noise logs before regex pre-mask
  buffer_max_size: 10000         # micro-batch size fed to clustering/vectorization; matches upstream LogBatcher's chunk_size default
  embedding_model: "nomic-embed-text"
  embedding_length_threshold: 4000  # logs longer than this (chars) skip embedding entirely and use Jaccard diverse selection instead; null = always attempt embedding
librelog:
  similarity_threshold: 0.5
  max_memory_size: null  # null = unbounded; set an integer to cap and evict oldest entries (FIFO)
  k_shots: 3
  enable_reflection: true
  use_drain_backup: false
  write_drain_backup: true
evaluator:
  nrows: null

deployer:
  dry_run: false
  pipeline_name: "so_custom_ingest_pipeline"
  parsed_logs_path: ""  # overrides the default /app/data/parsed/parsed_loghub_ecs.jsonl input path; leave blank ("") to use the default. Handy for pointing at a hand-picked single-template file for debugging without touching the real output — e.g. data/parsed/debug_single_template.jsonl.
  elasticsearch:
    port: 9200
    verify_certs: false
  saltstack:
    tmp_dir: "/tmp/"
    destination_dir: "/opt/so/saltstack/local/salt/elasticsearch/files/ingest/"
    file_owner: "elasticsearch:elasticsearch"  # confirmed via `id elasticsearch` on the live SO box (uid/gid 930) — the "so-elasticsearch" user this defaulted to previously does not exist on this installation and made the SaltStack chown step fail
  global_custom:  # used only by wire_global_custom.py, a separate opt-in step from the main deploy — see usage.md Component 5 section
    target_pipeline: ""  # blank = use deployer.pipeline_name above; the pipeline global@custom should route unmapped logs into
    condition: "ctx.event?.category == null"  # Painless "if" gate on the appended processor — mirrors Component 2's own definition of "unmapped" (NOT _exists_:event.category), so only logs the standard pipeline left uncategorized get routed through target_pipeline
