directories:
  input_dir: data/raw
  output_dir: data/processed
  cache_dir: data/cache
extractor:
  batch_size: 5000
  lookback_time: now-24h
llm:
  model_name: llama3
logparser_llm:
  k_shots: 3
  loose_match_threshold: 0.8
  use_positional_weighting: true  # Apply decay weighting to Jaccard loose match
  decay_factor: 0.15              # Decay coefficient lambda
  merge_similarity_threshold: 0.95
  categories_mode: 10             # Toggle between 3 or 10 dynamic categories
  embedding_model: "nomic-embed-text"
logbatcher:
  batch_size: 5
  sampler: "DPPSampler"          # "DPPSampler" or "SimilarSampler"
  cluster: "LengthCluster"        # "LengthCluster" or "SimilarityCluster"
  vectorizer: "binary"           # "binary" (Jaccard) or "tfidf" (Cosine)
  use_dynamic_eps: false         # scale DBSCAN eps dynamically
  embedding_model: "nomic-embed-text"
librelog:
  similarity_threshold: 0.85
  max_memory_size: 1000
  k_shots: 3
  enable_reflection: true
evaluator:
  nrows: 50000

deployer:
  dry_run: false
  pipeline_name: "so_custom_ingest_pipeline"
  elasticsearch:
    port: 9200
    verify_certs: false
  saltstack:
    tmp_dir: "/tmp/"
    destination_dir: "/opt/so/saltstack/local/salt/elasticsearch/files/ingest/"
    file_owner: "so-elasticsearch:so-elasticsearch"
