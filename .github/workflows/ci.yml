name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas scikit-learn numpy scipy Levenshtein requests pyyaml paramiko regex python-dotenv tqdm

    - name: Run Unit Tests
      run: |
        pytest tests/

    - name: Run E2E Integration Test
      run: |
        chmod +x run_e2e.sh
        ./run_e2e.sh
