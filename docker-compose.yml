services:
  component_1:
    build:
      context: ./component_1_dataset_gen
      dockerfile: Dockerfile
    image: component_1_dataset_gen
    container_name: dataset_generator
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    networks:
      - search-net

  component_2:
    build:
      context: ./component_2_so_extractor
      dockerfile: Dockerfile
    image: component_2_so_extractor
    container_name: so_extractor
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    networks:
      - search-net

  component_3:
    build:
      context: ./component_3_unified_parser
      dockerfile: Dockerfile
    image: component_3_unified_parser
    container_name: unified_parser
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      - LLM_DEBUG
    networks:
      - search-net

  component_4:
    build:
      context: ./component_4_evaluator
      dockerfile: Dockerfile
    image: component_4_evaluator
    container_name: evaluator
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    networks:
      - search-net

  component_5:
    build:
      context: ./component_5_deployer
      dockerfile: Dockerfile
    image: component_5_deployer
    container_name: so_deployer
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    networks:
      - search-net

networks:
  search-net:
    name: search-net
    external: true
